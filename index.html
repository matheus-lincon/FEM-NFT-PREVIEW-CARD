<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="NFT Preview Card" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | NFT preview card component</title>
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body>
    <main class="main">
      <article class="nft-card">
        <div class="nft-card__img">
          <img src="./images/image-equilibrium.jpg" alt="NFT artwork" />
        </div>
        <h1 class="nft-card__title">Equilibrium #3429</h1>
        <p class="nft-card__desc">
          Our Equilibrium collection promotes balance and calm.
        </p>
        <div class="nft-card__info">
          <p class="nft__card__price">
            <svg width="11" height="18" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M11 10.216 5.5 18 0 10.216l5.5 3.263 5.5-3.262ZM5.5 0l5.496 9.169L5.5 12.43 0 9.17 5.5 0Z"
              />
            </svg>
            0.041 ETH
          </p>
          <p class="nft-card__days">
            <svg
              aria-hidden="true"
              width="17"
              height="17"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M8.305 2.007a6.667 6.667 0 1 0 0 13.334 6.667 6.667 0 0 0 0-13.334Zm2.667 7.334H8.305a.667.667 0 0 1-.667-.667V6.007a.667.667 0 0 1 1.334 0v2h2a.667.667 0 0 1 0 1.334Z"
              />
            </svg>
            3 days left
          </p>
        </div>
        <!-- DIVIDER -->
        <div class="nft-card__divider"></div>

        <div class="nft-card__author">
          <div class="autor__img">
            <img
              width="132"
              height="132"
              src="./images/image-avatar.png"
              alt="Jules Wyvern avatar"
            />
          </div>
          <p class="autor__info">Creation of <span>Jules Wyvern</span></p>
        </div>
      </article>
    </main>
  </body>
</html>
